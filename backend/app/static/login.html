<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication | Sentrix AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/pages.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--background);
      margin: 0;
      overflow: hidden;
    }
    #login-screen {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, var(--surface-low) 0%, var(--background) 100%);
    }
    .login-box {
      width: 100%;
      max-width: 420px;
      padding: 3rem;
      background: var(--surface);
      border: 1px solid var(--outline-strong);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      position: relative;
      animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .login-box::before {
      content: '';
      position: absolute;
      top: -1px; left: 50%;
      width: 40%; height: 3px;
      background: var(--primary);
      transform: translateX(-50%);
      border-radius: 0 0 4px 4px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 3rem;
    }
    .login-logo .wordmark {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--on-surface);
      margin-bottom: 0.5rem;
    }
    .login-logo .tagline {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--on-surface-muted);
      text-transform: uppercase;
    }
    #login-err {
      margin-top: 1.5rem;
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      text-align: center;
      min-height: 1.2em;
    }
    /* .scanlines {
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 100, 0.03));
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      z-index: 100;
    } */
  </style>
</head>
<body>

<div class="scanlines"></div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="wordmark">SENTRIX AI</div>
      <div class="tagline">COGNITIVE VISION SUITE · CLASSIFIED</div>
    </div>
    
    <div class="field">
      <label>Operator ID</label>
      <input type="text" id="li-user" placeholder="admin" autocomplete="off" spellcheck="false" required>
    </div>
    
    <div class="field">
      <label>Authorization Key</label>
      <div class="password-wrapper">
        <input type="password" id="li-pass" placeholder="••••••••" required>
        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('li-pass', 'eye-icon-login')" tabindex="-1">
          <svg id="eye-icon-login" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
    </div>
    
    <button class="btn btn-primary" style="width:100%; margin-top:1rem" onclick="performLogin()" id="login-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:0.5rem">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      AUTHENTICATE
    </button>
    
    <div id="login-err"></div>
  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.getToken() && !Auth.isExpired()) {
    const role = Auth.getRole();
    window.location.href = role === 'admin' ? '/admin' : '/dashboard';
  }

  function togglePasswordVisibility(inputId, iconId) {
    const passwordInput = document.getElementById(inputId);
    const eyeIcon = document.getElementById(iconId);
    if (!passwordInput || !eyeIcon) return;
    
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      eyeIcon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      `;
    } else {
      passwordInput.type = 'password';
      eyeIcon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      `;
    }
  }

  async function performLogin() {
    const username = document.getElementById('li-user').value.trim();
    const password = document.getElementById('li-pass').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-err');

    if (!username || !password) {
      err.textContent = 'ERROR: OPERATOR_ID AND AUTH_KEY REQUIRED';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = 'AUTHENTICATING...';
    err.textContent = '';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.detail || 'INVALID_CREDENTIALS');
      }

      const { token } = await res.json();
      Auth.setToken(token);

      // Route based on role
      const role = Auth.getRole();
      window.location.href = role === 'admin' ? '/admin' : '/dashboard';
    } catch (e) {
      err.textContent = 'ACCESS_DENIED: ' + e.message.toUpperCase();
      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:0.5rem">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg> AUTHENTICATE`;
      
      // Visual feedback for error
      const box = document.querySelector('.login-box');
      box.style.animation = 'none';
      box.offsetHeight; // trigger reflow
      box.style.animation = 'shake 0.4s ease';
    }
  }

  // Handle Enter key
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') performLogin();
  });
</script>

</body>
</html>
