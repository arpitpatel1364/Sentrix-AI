<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sentrix AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--background);
      margin: 0;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(10px);
      animation: fadeInScale 0.5s var(--transition-spring);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .login-logo .wordmark {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--on-surface);
      margin-bottom: 0.5rem;
    }
    .login-logo .tagline {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--on-surface-muted);
      text-transform: uppercase;
    }
    .field {
      margin-bottom: 1.5rem;
    }
    .field label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--on-surface-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field input {
      width: 100%;
      background: var(--surface-low);
      border: 1px solid var(--outline);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      color: var(--on-surface);
      font-family: var(--font-body);
      transition: var(--transition);
    }
    .field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }
    .login-btn {
      width: 100%;
      background: var(--primary);
      color: var(--on-primary);
      border: none;
      border-radius: var(--radius-md);
      padding: 0.85rem;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
    }
    .login-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--primary-glow);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .error-msg {
      margin-top: 1rem;
      padding: 0.75rem;
      background: var(--red-dim);
      border: 1px solid var(--red);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-size: 0.8rem;
      font-family: var(--font-mono);
      display: none;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <div class="wordmark">SENTRIX AI</div>
      <div class="tagline">Cognitive Vision Suite</div>
    </div>
    
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="admin" required>
    </div>
    
    <div class="field">
      <label for="password">Security Key</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    
    <button class="login-btn" onclick="performLogin()" id="login-submit">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/>
      </svg>
      SIGN IN
    </button>
    
    <div id="login-error" class="error-msg"></div>
  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.getToken() && !Auth.isExpired()) {
    const role = Auth.getRole();
    window.location.href = role === 'admin' ? '/admin' : '/dashboard';
  }

  async function performLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-submit');
    const err = document.getElementById('login-error');

    if (!username || !password) {
      showError('Please enter both username and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'AUTHENTICATING...';
    err.style.display = 'none';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.detail || 'Invalid username or password');
      }

      const { token } = await res.json();
      Auth.setToken(token);

      // Route based on role
      const role = Auth.getRole();
      if (role === 'admin') {
        window.location.href = '/admin';
      } else {
        window.location.href = '/dashboard';
      }
    } catch (e) {
      showError(e.message);
      btn.disabled = false;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg> SIGN IN';
    }
  }

  function showError(msg) {
    const err = document.getElementById('login-error');
    err.textContent = msg;
    err.style.display = 'block';
    
    // Shake animation
    const card = document.querySelector('.login-card');
    card.style.animation = 'none';
    card.offsetHeight; // trigger reflow
    card.style.animation = 'shake 0.4s ease';
  }

  // Handle Enter key
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') performLogin();
  });
</script>

</body>
</html>
