<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Sentrix AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/animations.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Specific overrides for Dashboard to match index.html feel */
    .app-shell {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--background);
    }
    .pages {
      flex: 1;
      overflow-y: auto;
      padding: 2.5rem;
    }
    .camera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .camera-tile {
      background: var(--surface);
      border: 1px solid var(--outline);
      border-radius: var(--radius-xl);
      overflow: hidden;
      aspect-ratio: 16/10;
      position: relative;
      box-shadow: var(--shadow-sm);
      transition: all var(--transition);
    }
    .camera-tile:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary);
    }
    .camera-stream {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
    .camera-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.25rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .status-badge {
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    .status-online { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-dim); }
    .status-offline { background: var(--surface-high); color: var(--on-surface-muted); border: 1px solid var(--outline); }
    
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 1rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--primary-dim);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
  </style>
</head>
<body>

<div class="app-shell" id="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-header">
      <div class="sb-brand">
        <div class="sb-logo-icon">SX</div>
        <div>
          <div class="sb-wordmark">SENTRIX</div>
          <div class="sb-sub">ADVANCED VISION SUITE</div>
        </div>
      </div>
    </div>

    <div class="sb-status">
      <div class="sb-dot" id="status-dot"></div>
      <span class="sb-status-text" id="status-text">CONNECTING…</span>
      <span class="sb-node-count" id="sb-node-count">0 NODES</span>
    </div>

    <nav class="sb-nav" id="sidebar-nav">
      <!-- Nav items injected here -->
    </nav>

    <div class="sb-footer">
      <div class="user-av" id="user-initials">?</div>
      <div class="user-details">
        <div class="user-name" id="client-name-display">—</div>
        <div class="user-role-label" id="role-label-display">CLIENT</div>
      </div>
      <button class="logout-btn" onclick="Auth.logout()" title="Logout">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>LOGOUT</span>
      </button>
    </div>

    <!-- Floating Toggle -->
    <button class="sb-toggle-btn" onclick="toggleSidebar()" title="Toggle Sidebar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
  </aside>

  <!-- Main Area -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-left">
        <div>
          <div class="page-title" id="page-title">DASHBOARD</div>
          <div class="breadcrumb" id="topbar-sub">// TACTICAL INTELLIGENCE INTERFACE</div>
        </div>
      </div>
      <div class="topbar-right">
        <span class="sys-time" id="sys-time">--:--:--</span>
        <div id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <span class="theme-icon" id="theme-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
          <span id="theme-label">DARK</span>
        </div>
      </div>
    </header>

    <div class="pages" id="content-area">
      <!-- Content injected here -->
    </div>
  </div>
</div>

<!-- Add Person Modal -->
<div class="modal-overlay" id="modal-add-person">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-add-person')">✕</button>
    <div class="modal-title">REGISTER NEW SUBJECT</div>
    <div class="form-group">
      <label class="form-label">Subject Name</label>
      <input type="text" id="new-person-name" placeholder="Full Name">
    </div>
    <div class="form-group">
      <label class="form-label">Face Photo</label>
      <div class="upload-zone" onclick="document.getElementById('person-photo').click()">
        <input type="file" id="person-photo" accept="image/*" style="display:none" onchange="previewPhoto(this)">
        <div id="photo-preview-placeholder">
          <div class="upload-icon">⊕</div>
          <div class="upload-text">Upload clear face photo</div>
        </div>
        <img id="photo-preview-img" style="display:none; width: 100%; height: auto; border-radius: var(--radius-md);">
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%; margin-top:1rem" onclick="submitNewPerson()" id="submit-person-btn">Enroll Subject</button>
  </div>
</div>

<script src="/static/js/auth.js"></script>
<script>
  // 1. Auth Guard
  if (!Auth.guard('client')) {
    // Redirect handled by guard
  }

  // State
  let activePage = 'live';
  let sseSource = null;
  let myWorkers = [];
  let mediaToken = null;

  // Constants
  const NAV_ITEMS = [
    { key: 'live_monitor',      label: 'Live Monitor',    page: 'live',      icon: `<svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>` },
    { key: 'alert_feed',        label: 'Alert Feed',      page: 'alerts',    icon: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>` },
    { key: 'sighting_history',  label: 'Sighting History',page: 'history',   icon: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s3-7 11-7 11 7 11 7-3 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>` },
    { key: 'watchlist_manager', label: 'Watchlist',       page: 'watchlist', icon: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>` },
    { key: 'analytics',         label: 'Analytics',       page: 'analytics', icon: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="18" y="3" width="3" height="18"/><rect x="11" y="8" width="3" height="13"/><rect x="4" y="13" width="3" height="8"/></svg>` },
    { key: 'settings',          label: 'Settings',        page: 'settings',  icon: `<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>` },
  ];

  // Initialize
  async function init() {
    const payload = Auth.getPayload();
    document.getElementById('client-name-display').textContent = payload.client_name || 'Client';
    document.getElementById('role-label-display').textContent = Auth.getRoleLabel();
    document.getElementById('user-initials').textContent = (payload.client_name || 'C')[0].toUpperCase();

    buildSidebar();
    startClock();
    applyInitialTheme();
    
    await fetchMediaToken();
    await fetchWorkers();
    
    // Load default page or hash
    const hash = window.location.hash.replace('#', '');
    if (hash && NAV_ITEMS.find(i => i.page === hash && Auth.can(i.key))) {
      showPage(hash);
    } else {
      // Find first permitted page
      const firstPermitted = NAV_ITEMS.find(i => Auth.can(i.key));
      if (firstPermitted) showPage(firstPermitted.page);
    }
  }

  function startClock() {
    const el = document.getElementById('sys-time');
    const update = () => el.textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
    update();
    setInterval(update, 1000);
  }

  function applyInitialTheme() {
    const saved = localStorage.getItem('sx-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    const label = document.getElementById('theme-label');
    if (label) label.textContent = saved.toUpperCase();
  }

  function toggleTheme() {
    const curr = document.documentElement.getAttribute('data-theme');
    const next = curr === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('sx-theme', next);
    document.getElementById('theme-label').textContent = next.toUpperCase();
    
    const icon = document.getElementById('theme-icon');
    icon.innerHTML = next === 'dark' 
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
  }

  function toggleSidebar() {
    document.querySelector('.app-shell').classList.toggle('collapsed');
  }

  async function fetchMediaToken() {
    try {
      const res = await fetch('/auth/media-token', { headers: Auth.headers() });
      if (res.ok) {
        const data = await res.json();
        mediaToken = data.media_token;
      }
    } catch (e) {
      console.error('Failed to fetch media token', e);
    }
  }

  async function fetchWorkers() {
    try {
      const res = await fetch('/workers/mine', { headers: Auth.headers() });
      if (res.ok) {
        myWorkers = await res.json();
        document.getElementById('sb-node-count').textContent = `${myWorkers.length} NODES`;
      }
    } catch (e) {
      console.error('Failed to fetch workers', e);
    }
  }

  function buildSidebar() {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = '';
    
    NAV_ITEMS.forEach(item => {
      if (Auth.can(item.key)) {
        const el = document.createElement('div');
        el.className = `nav-item ${activePage === item.page ? 'active' : ''}`;
        el.id = `nav-${item.page}`;
        el.innerHTML = `${item.icon} <span class="nav-label">${item.label}</span>`;
        el.onclick = () => showPage(item.page);
        nav.appendChild(el);
      }
    });
  }

  function showPage(page) {
    activePage = page;
    window.location.hash = page;
    
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const activeNav = document.getElementById(`nav-${page}`);
    if (activeNav) activeNav.classList.add('active');

    const item = NAV_ITEMS.find(i => i.page === page);
    document.getElementById('page-title').textContent = item ? item.label.toUpperCase() : 'DASHBOARD';
    document.getElementById('topbar-sub').textContent = `// TACTICAL INTELLIGENCE DASHBOARD > ${item ? item.label.toUpperCase() : 'OVERVIEW'}`;

    renderPage(page);
    
    if (page !== 'alerts' && sseSource) {
      sseSource.close();
      sseSource = null;
      updateConnectionStatus(false);
    } else if (page === 'alerts' && !sseSource) {
      initAlertSSE();
    }
  }

  function updateConnectionStatus(ok) {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    if (!dot || !text) return;
    
    if (ok) {
      dot.className = 'sb-dot';
      text.textContent = 'SYSTEM ACTIVE';
    } else {
      dot.className = 'sb-dot offline';
      text.textContent = 'CONNECTION LOST';
    }
  }

  function renderPage(page) {
    const container = document.getElementById('content-area');
    container.innerHTML = `<div class="loading-overlay"><div class="spinner"></div><div style="font-family:var(--font-mono); font-size:0.7rem; color:var(--primary); letter-spacing:0.1em;">INITIALIZING PAGE…</div></div>`;

    switch(page) {
      case 'live': renderLiveMonitor(); break;
      case 'alerts': renderAlertFeed(); break;
      case 'history': renderHistory(); break;
      case 'watchlist': renderWatchlist(); break;
      case 'analytics': renderAnalytics(); break;
      case 'settings': renderSettings(); break;
    }
  }

  // --- PAGE RENDERERS ---

  async function renderLiveMonitor() {
    const container = document.getElementById('content-area');
    container.innerHTML = `
      <div class="sec-head">
        <div>
          <div class="sec-title">LIVE MONITOR</div>
          <div class="sec-sub">// REAL-TIME SURVEILLANCE MATRIX</div>
        </div>
      </div>
      <div id="live-grid" class="camera-grid"></div>
    `;

    const grid = document.getElementById('live-grid');
    if (myWorkers.length === 0) {
      grid.innerHTML = '<div class="empty-state">No workers assigned to your account.</div>';
      return;
    }

    updateConnectionStatus(true);

    for (const worker of myWorkers) {
      let status = 'offline';
      try {
        const hRes = await fetch(`${worker.media_base_url}/health`);
        if (hRes.ok) status = 'online';
      } catch(e) {}

      const cRes = await fetch(`/cameras/?worker_id=${worker.id}`, { headers: Auth.headers() });
      if (cRes.ok) {
        const cameras = await cRes.json();
        cameras.forEach((cam, idx) => {
          const tile = document.createElement('div');
          tile.className = 'camera-tile';
          const streamUrl = status === 'online' 
            ? `${worker.media_base_url}/stream/${idx}?token=${mediaToken}`
            : '';
            
          tile.innerHTML = `
            ${status === 'online' 
              ? `<img class="camera-stream" src="${streamUrl}" onerror="this.src='/static/img/no-signal.jpg'">`
              : `<div class="camera-stream" style="display:flex;align-items:center;justify-content:center;color:var(--on-surface-muted);"><div style="text-align:center"><div style="font-size:1.5rem;margin-bottom:0.5rem">◎</div><div style="font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.1em">DATA LINK OFFLINE</div></div></div>`}
            <div class="camera-info">
              <div>
                <div style="color:white; font-weight:700; font-family:var(--font-display); font-size:0.95rem; text-shadow: 0 1px 4px rgba(0,0,0,0.8);">${cam.name.toUpperCase()}</div>
                <div style="font-family:var(--font-mono); font-size:0.6rem; color:rgba(255,255,255,0.6); letter-spacing:0.05em; margin-top:0.2rem;">NODE: ${worker.label.toUpperCase()}</div>
              </div>
              <span class="status-badge status-${status}">${status}</span>
            </div>
          `;
          grid.appendChild(tile);
        });
      }
    }
  }

  function renderAlertFeed() {
    const container = document.getElementById('content-area');
    container.innerHTML = `
      <div class="sec-head">
        <div>
          <div class="sec-title">ACTIVE ALERT FEED</div>
          <div class="sec-sub">// REAL-TIME BIOMETRIC DETECTION EVENTS</div>
        </div>
        <div class="sec-actions">
           <button class="btn btn-ghost btn-sm" onclick="document.getElementById('feed-list').innerHTML=''">Clear Feed</button>
        </div>
      </div>
      <div id="feed-list" style="display:flex; flex-direction:column; gap:1rem; max-width:900px; margin:0 auto;"></div>
    `;
  }

  async function renderHistory() {
    const container = document.getElementById('content-area');
    container.innerHTML = `
      <div class="sec-head">
        <div>
          <div class="sec-title">SIGHTING HISTORY</div>
          <div class="sec-sub">// HISTORICAL BIOMETRIC ARCHIVE</div>
        </div>
      </div>
      <div class="table-wrap">
        <table style="width:100%">
          <thead>
            <tr>
              <th>Snapshot</th>
              <th>Identity</th>
              <th>Confidence</th>
              <th>Origin Node</th>
              <th>Timestamp</th>
            </tr>
          </thead>
          <tbody id="history-table-body">
            <tr><td colspan="5" style="text-align:center; padding:3rem; color:var(--on-surface-muted);">Initialising stream archive…</td></tr>
          </tbody>
        </table>
      </div>
    `;

    try {
      const res = await fetch('/sightings/?limit=30', { headers: Auth.headers() });
      const data = await res.json();
      const sightings = data.sightings || [];
      const tbody = document.getElementById('history-table-body');
      tbody.innerHTML = '';

      if (sightings.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:3rem; color:var(--on-surface-muted);">No records found in current segment.</td></tr>';
        return;
      }

      sightings.forEach(s => {
        const worker = myWorkers.find(w => w.id === s.worker_id);
        const snapUrl = worker 
          ? `${worker.media_base_url}/snapshots/${s.snapshot_path}?token=${mediaToken}`
          : null;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${snapUrl ? `<img src="${snapUrl}" class="td-img" style="border-radius:var(--radius-sm);">` : '<div class="td-img" style="background:var(--surface-high); display:flex; align-items:center; justify-content:center; font-size:0.6rem;">N/A</div>'}</td>
          <td><span class="badge ${s.person_name === 'Unknown' ? '' : 'badge-match'}" style="font-size:0.7rem; padding:0.35rem 0.75rem;">${s.person_name.toUpperCase()}</span></td>
          <td class="td-mono" style="color:var(--primary); font-weight:700;">${(s.confidence * 100).toFixed(1)}%</td>
          <td style="font-weight:600; font-size:0.82rem;">${(s.camera_name || 'UNK').toUpperCase()}</td>
          <td class="td-mono">${new Date(s.timestamp).toLocaleString('en-GB', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', hour12:false})}</td>
        `;
        tbody.appendChild(tr);
      });
    } catch (e) {
      console.error(e);
    }
  }

  async function renderWatchlist() {
    const container = document.getElementById('content-area');
    container.innerHTML = `
      <div class="sec-head">
        <div>
          <div class="sec-title">WATCHLIST MANAGER</div>
          <div class="sec-sub">// SUBJECT INTELLIGENCE REGISTRY</div>
        </div>
        <div class="sec-actions">
           <button class="btn btn-primary btn-sm" onclick="openModal('modal-add-person')">+ ADD TARGET</button>
        </div>
      </div>
      <div class="table-wrap">
        <table style="width:100%">
          <thead>
            <tr>
              <th>Subject Alias</th>
              <th>Enlistment Date</th>
              <th style="text-align:right">Operational Actions</th>
            </tr>
          </thead>
          <tbody id="watchlist-table-body"></tbody>
        </table>
      </div>
    `;
    loadWatchlist();
  }

  async function loadWatchlist() {
    const tbody = document.getElementById('watchlist-table-body');
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:3rem; color:var(--on-surface-muted);">Retrieving subject dossiers…</td></tr>';
    
    try {
      const res = await fetch('/watchlist/', { headers: Auth.headers() });
      if (!res.ok) throw new Error();
      const items = await res.json();
      tbody.innerHTML = '';
      
      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:3rem; color:var(--on-surface-muted);">Registry is currently empty.</td></tr>';
        return;
      }

      items.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-weight:700; font-size:0.95rem; color:var(--on-surface);">${item.person_name.toUpperCase()}</td>
          <td class="td-mono">${new Date(item.created_at).toLocaleDateString()}</td>
          <td style="text-align:right">
            <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteFromWatchlist(${item.id}, '${item.qdrant_vector_id}')">TERMINATE PROFILE</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--red); padding:3rem;">ERROR: FAILED TO RETRIEVE WATCHLIST DATA</td></tr>';
    }
  }

  async function renderAnalytics() {
    const container = document.getElementById('content-area');
    container.innerHTML = `
      <div class="sec-head">
        <div>
          <div class="sec-title">SYSTEM ANALYTICS</div>
          <div class="sec-sub">// DETECTION TRENDS & ENGINE PERFORMANCE</div>
        </div>
      </div>
      <div id="analytics-stats-strip" style="display:grid; grid-template-columns:repeat(4,1fr); gap:1.25rem; margin-bottom:2rem;">
         <div class="panel" style="padding:1.5rem; text-align:center;">
            <div class="stat-label">TOTAL SIGHTINGS</div>
            <div class="stat-val" style="font-size:2.4rem; color:var(--primary);" id="stat-total-sightings">—</div>
         </div>
         <div class="panel" style="padding:1.5rem; text-align:center;">
            <div class="stat-label">TARGET MATCHES</div>
            <div class="stat-val" style="font-size:2.4rem; color:var(--red);" id="stat-total-matches">—</div>
         </div>
         <div class="panel" style="padding:1.5rem; text-align:center;">
            <div class="stat-label">ACTIVE NODES</div>
            <div class="stat-val" style="font-size:2.4rem; color:var(--green);" id="stat-active-nodes">—</div>
         </div>
         <div class="panel" style="padding:1.5rem; text-align:center;">
            <div class="stat-label">CONFIDENCE AVG</div>
            <div class="stat-val" style="font-size:2.4rem; color:var(--cyan);" id="stat-avg-conf">—</div>
         </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
        <div class="panel">
          <div class="panel-title">Detection Frequency (24h)</div>
          <div style="height:300px"><canvas id="chart-daily-detections"></canvas></div>
        </div>
        <div class="panel">
          <div class="panel-title">Subject distribution</div>
          <div style="height:300px"><canvas id="chart-top-persons"></canvas></div>
        </div>
      </div>
    `;

    try {
      const res = await fetch('/sightings/analytics', { headers: Auth.headers() });
      const data = await res.json();
      initAnalyticsCharts(data);
      
      // Fill stats
      document.getElementById('stat-total-sightings').textContent = data.summary?.total || 0;
      document.getElementById('stat-total-matches').textContent = data.summary?.matches || 0;
      document.getElementById('stat-active-nodes').textContent = myWorkers.length;
      document.getElementById('stat-avg-conf').textContent = ((data.summary?.avg_conf || 0)*100).toFixed(0) + '%';
    } catch (e) {
      console.error('Analytics failed', e);
    }
  }

  function initAnalyticsCharts(data) {
    new Chart(document.getElementById('chart-daily-detections'), {
      type: 'line',
      data: {
        labels: data.daily?.labels || [],
        datasets: [{
          label: 'Detections',
          data: data.daily?.counts || [],
          borderColor: '#4d7cff',
          backgroundColor: 'rgba(77,124,255,0.1)',
          fill: true,
          tension: 0.4
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, grid: { color: 'rgba(128,128,128,0.1)' } }, x: { grid: { display: false } } }
      }
    });

    new Chart(document.getElementById('chart-top-persons'), {
      type: 'doughnut',
      data: {
        labels: data.top_persons?.labels || [],
        datasets: [{
          data: data.top_persons?.counts || [],
          backgroundColor: ['#4d7cff', '#00d2ff', '#9d7cff', '#00e676', '#ff4d4d'],
          borderWidth: 0
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false,
        cutout: '70%',
        plugins: { legend: { position: 'right', labels: { color: '#707a9e', font: { family: 'Inter' } } } }
      }
    });
  }

  async function renderSettings() {
    const container = document.getElementById('content-area');
    const canManageCameras = Auth.can('camera_management');

    container.innerHTML = `
      <div class="sec-head">
        <div>
          <div class="sec-title">SYSTEM SETTINGS</div>
          <div class="sec-sub">// ACCOUNT & OPERATIONAL PREFERENCES</div>
        </div>
      </div>
      
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:2rem; max-width:1200px;">
        <div style="display:flex; flex-direction:column; gap:2rem;">
          <div class="panel">
            <div class="panel-title">OPERATOR IDENTITY</div>
            <div style="margin-bottom: 2rem; padding: 1.25rem; background: var(--surface-low); border-radius: var(--radius-md); border:1px solid var(--outline);">
              <div style="font-size: 0.65rem; font-family:var(--font-mono); color: var(--on-surface-muted); text-transform:uppercase; margin-bottom:0.4rem;">Operational Role</div>
              <div style="font-weight: 800; font-size:1.1rem; color: var(--primary); letter-spacing:0.05em;">${Auth.getRoleLabel().toUpperCase()}</div>
            </div>
            <div class="field">
              <label>Update Authorization Key</label>
              <div class="password-wrapper">
                <input type="password" id="set-pass" placeholder="••••••••">
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility('set-pass', 'eye-icon-settings')" tabindex="-1">
                  <svg id="eye-icon-settings" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <button class="btn btn-outline btn-sm" style="width:100%" onclick="changePassword()">DEPLOY NEW KEY</button>
          </div>

          <div class="panel">
            <div class="panel-title">COMMUNICATIONS</div>
            <div class="field">
              <label>External Webhook Dispatch (Slack/Discord)</label>
              <input type="text" id="set-webhook" placeholder="https://hooks.example.com/...">
            </div>
            <div style="display:flex; flex-direction:column; gap:0.75rem; margin-bottom:1.5rem;">
              <label style="display:flex; align-items:center; gap:0.75rem; cursor:pointer; font-size:0.85rem; font-weight:600;">
                <input type="checkbox" id="set-alert-match" checked> SIGNAL ON TARGET MATCH
              </label>
              <label style="display:flex; align-items:center; gap:0.75rem; cursor:pointer; font-size:0.85rem; font-weight:600;">
                <input type="checkbox" id="set-alert-unknown"> SIGNAL ON UNKNOWN SUBJECT
              </label>
            </div>
            <button class="btn btn-primary btn-sm" style="width:100%" onclick="saveNotifySettings()">COMMIT PREFERENCES</button>
          </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:2rem;">
          ${canManageCameras ? `
          <div class="panel">
            <div class="panel-title">NODE MANAGEMENT</div>
            <div id="settings-camera-list" style="display:flex; flex-direction:column; gap:0.75rem; margin-bottom:1.5rem;"></div>
            <div style="padding:1.5rem; border:1px dashed var(--outline-strong); border-radius:var(--radius-lg); background:var(--surface-low);">
              <div style="font-weight:800; font-size:0.8rem; margin-bottom:1.25rem; letter-spacing:0.05em; color:var(--on-surface);">REGISTER NEW CAMERA NODE</div>
              <div class="field"><label>Node Label</label><input type="text" id="cam-name" placeholder="E.g. Loading Dock B"></div>
              <div class="field"><label>Assignment Worker</label><select id="cam-worker-id" style="font-family:var(--font-mono); font-size:0.85rem;"></select></div>
              <div class="field"><label>Data Stream (RTSP/HTTP)</label><input type="text" id="cam-rtsp" placeholder="rtsp://admin:key@192.168.1.50:554/ch1"></div>
              <button class="btn btn-primary btn-sm" style="width:100%" onclick="addCamera()">PROVISION NODE</button>
            </div>
          </div>
          ` : `
          <div class="panel">
            <div class="panel-title">OPERATIONAL NODES</div>
            <div id="settings-worker-list" style="display:flex; flex-direction:column; gap:0.75rem;"></div>
          </div>
          `}
        </div>
      </div>
    `;

    if (canManageCameras) {
      loadSettingsCameras();
      const select = document.getElementById('cam-worker-id');
      myWorkers.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w.id;
        opt.textContent = w.label.toUpperCase();
        select.appendChild(opt);
      });
    } else {
      loadSettingsWorkers();
    }
  }

  async function loadSettingsCameras() {
    const list = document.getElementById('settings-camera-list');
    list.innerHTML = '<div style="font-family:var(--font-mono); font-size:0.65rem; color:var(--on-surface-muted);">SYNCING NODES…</div>';
    try {
      const res = await fetch('/cameras/', { headers: Auth.headers() });
      const cams = await res.json();
      list.innerHTML = '';
      if (cams.length === 0) list.innerHTML = '<div style="font-size:0.8rem; color:var(--on-surface-muted); padding:1rem; text-align:center;">No active nodes found.</div>';
      cams.forEach(c => {
        const el = document.createElement('div');
        el.className = 'result-item';
        el.style.background = 'var(--surface-low)';
        el.style.padding = '0.85rem 1.25rem';
        el.style.borderRadius = 'var(--radius-md)';
        el.style.border = '1px solid var(--outline)';
        el.innerHTML = `
          <div>
            <div style="font-weight:700; font-size:0.85rem;">${c.name.toUpperCase()}</div>
            <div style="font-family:var(--font-mono); font-size:0.6rem; color:var(--on-surface-muted); margin-top:2px;">STREAM: SECURED_CHANNEL</div>
          </div>
          <button class="btn btn-ghost btn-sm btn-danger" style="padding:0.4rem 0.75rem; font-size:0.65rem;" onclick="deleteCamera(${c.id})">TERMINATE</button>
        `;
        list.appendChild(el);
      });
    } catch(e) {}
  }

  async function loadSettingsWorkers() {
    const list = document.getElementById('settings-worker-list');
    list.innerHTML = '';
    for(const w of myWorkers) {
      let status = 'offline';
      try {
        const hRes = await fetch(`${w.media_base_url}/health`);
        if (hRes.ok) status = 'online';
      } catch(e) {}
      
      const el = document.createElement('div');
      el.className = 'result-item';
      el.style.background = 'var(--surface-low)';
      el.style.padding = '1rem 1.25rem';
      el.style.borderRadius = 'var(--radius-md)';
      el.style.border = '1px solid var(--outline)';
      el.innerHTML = `
        <div>
          <div style="font-weight:800; font-size:0.9rem;">${w.label.toUpperCase()}</div>
          <div style="font-family:var(--font-mono); font-size:0.6rem; color:var(--on-surface-muted); margin-top:3px;">LAST SEEN @ ${new Date(w.last_seen || Date.now()).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', hour12:false})}</div>
        </div>
        <span class="status-badge status-${status}">${status}</span>
      `;
      list.appendChild(el);
    }
  }

  // --- ACTIONS ---

  function initAlertSSE() {
    if (sseSource) sseSource.close();
    updateConnectionStatus(false);
    
    sseSource = new EventSource(`/sse/events?token=${Auth.getToken()}`);
    
    sseSource.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (activePage === 'alerts') {
        addAlertCard(data);
      }
    };
  }

  function updateConnectionStatus(status) {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    if (!dot || !text) return;
    
    switch(status) {
      case 'connected': 
        dot.style.background = 'var(--green)';
        text.textContent = 'LIVE CONNECTION';
        break;
      case 'connecting':
      case 'reconnecting':
        dot.style.background = 'var(--amber)';
        text.textContent = 'RECONNECTING...';
        break;
      case 'disconnected':
        dot.style.background = 'var(--red)';
        text.textContent = 'DISCONNECTED';
        break;
    }
  }

  function addAlertCard(data) {
    const feed = document.getElementById('feed-list');
    if (!feed) return;

    const card = document.createElement('div');
    card.className = 'alert-card';
    card.innerHTML = `
      <img src="${data.snapshot_url}" class="alert-thumb" onerror="this.src='/static/img/no-signal.jpg'">
      <div class="alert-details">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
          <div>
            <span class="badge ${data.person_name === 'Unknown' ? 'badge-ghost' : 'badge-primary'}" style="font-size:0.9rem;">${data.person_name}</span>
            <div style="font-size:0.75rem; color:var(--on-surface-muted); margin-top:0.25rem;">Detected at <strong>${data.camera_name}</strong></div>
          </div>
          <span class="badge" style="font-family:var(--font-mono); border:1px solid var(--outline);">${(data.confidence * 100).toFixed(0)}% Match</span>
        </div>
        <div style="margin-top:1rem; font-family:var(--font-mono); font-size:0.65rem; color:var(--on-surface-muted);">
          REF: ${data.timestamp.split('T')[1].split('.')[0]} • ${data.worker_label}
        </div>
      </div>
    `;
    feed.prepend(card);
    
    // Max 50 cards
    if (feed.children.length > 50) {
      feed.removeChild(feed.lastChild);
    }
  }

  // Watchlist Actions
  function openModal(id) { document.getElementById(id).style.display = 'flex'; }
  function closeModal(id) { document.getElementById(id).style.display = 'none'; }

  function previewPhoto(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('photo-preview-img').src = e.target.result;
        document.getElementById('photo-preview-img').style.display = 'block';
        document.getElementById('photo-preview-placeholder').style.display = 'none';
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  async function submitNewPerson() {
    const name = document.getElementById('new-person-name').value.trim();
    const photoInput = document.getElementById('person-photo');
    const btn = document.getElementById('submit-person-btn');

    if (!name || !photoInput.files[0]) {
      alert('Subject name and photo are required.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Enrolling...';

    try {
      // 1. Pick a worker to compute embedding (arbitrarily pick first online worker)
      const worker = myWorkers[0]; // Simplified: ideally find an online one
      if (!worker) throw new Error('No operational worker found to process biometric data.');

      const formData = new FormData();
      formData.append('file', photoInput.files[0]);

      const embRes = await fetch(`${worker.media_base_url}/compute-embedding?token=${mediaToken}`, {
        method: 'POST',
        body: formData
      });

      if (!embRes.ok) throw new Error('Worker failed to process face photo. Ensure 1 clear face is visible.');
      const { embedding } = await embRes.json();

      // 2. Upsert to Qdrant
      const qdRes = await fetch('/qdrant/upsert', {
        method: 'POST',
        headers: Auth.headers(),
        body: JSON.stringify({ person_name: name, embedding })
      });
      if (!qdRes.ok) throw new Error('Database failed to accept biometric vector.');
      const { vector_id } = await qdRes.json();

      // 3. Save to Watchlist
      const wlRes = await fetch('/watchlist/', {
        method: 'POST',
        headers: Auth.headers(),
        body: JSON.stringify({ person_name: name, qdrant_vector_id: vector_id })
      });
      if (!wlRes.ok) throw new Error('Failed to save watchlist record.');

      closeModal('modal-add-person');
      loadWatchlist();
      // Reset form
      document.getElementById('new-person-name').value = '';
      photoInput.value = '';
      document.getElementById('photo-preview-img').style.display = 'none';
      document.getElementById('photo-preview-placeholder').style.display = 'block';
    } catch (e) {
      alert(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Enroll Subject';
    }
  }

  async function deleteFromWatchlist(id, vectorId) {
    if (!confirm('Permanently remove this subject from intelligence archive?')) return;
    try {
      await fetch(`/watchlist/${id}`, { method: 'DELETE', headers: Auth.headers() });
      await fetch(`/qdrant/vectors/${vectorId}`, { method: 'DELETE', headers: Auth.headers() });
      loadWatchlist();
    } catch (e) { alert('Delete failed.'); }
  }

  // Settings Actions
  async function addCamera() {
    const name = document.getElementById('cam-name').value;
    const worker_id = document.getElementById('cam-worker-id').value;
    const rtsp_url = document.getElementById('cam-rtsp').value;
    
    if (!name || !rtsp_url) return alert('Name and RTSP URL required.');
    
    const res = await fetch('/cameras/', {
      method: 'POST',
      headers: Auth.headers(),
      body: JSON.stringify({ name, worker_id: parseInt(worker_id), rtsp_url })
    });
    
    if (res.ok) {
      loadSettingsCameras();
      document.getElementById('cam-name').value = '';
      document.getElementById('cam-rtsp').value = '';
    } else {
      const d = await res.json(); alert(d.detail || 'Failed');
    }
  }

  async function deleteCamera(id) {
    if (confirm('Delete camera?')) {
      await fetch(`/cameras/${id}`, { method: 'DELETE', headers: Auth.headers() });
      loadSettingsCameras();
    }
  }

  function togglePasswordVisibility(inputId, iconId) {
    const passwordInput = document.getElementById(inputId);
    const eyeIcon = document.getElementById(iconId);
    
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      eyeIcon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      `;
    } else {
      passwordInput.type = 'password';
      eyeIcon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      `;
    }
  }

  // Init
  init();

</script>
